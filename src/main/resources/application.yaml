ktor:
  deployment:
    port: ${SERVER_PORT:8080}
  application:
    modules:
      - dev.jskrzypczak.photovault.server.ApplicationKt.module

photovault:
  version: "1.0.0"
  storage:
    root: ${PHOTO_STORAGE_ROOT:./data/photos}
  categorizer:
    command: ${CATEGORIZER_CMD:}
    workdir: ${CATEGORIZER_WORKDIR:./categorizer}

db:
  url: ${DB_URL:jdbc:postgresql://localhost:5432/photovault}
  user: ${DB_USER:photovault}
  password: ${DB_PASSWORD:change-me}

jwt:
  secret: ${JWT_SECRET:dev-secret-change-me-in-production}
  issuer: ${JWT_ISSUER:photovault}
  audience: ${JWT_AUDIENCE:photovault-client}
  accessTtlMinutes: ${JWT_ACCESS_TTL_MIN:60}
  refreshTtlDays: ${JWT_REFRESH_TTL_DAYS:30}
