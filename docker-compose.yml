services:
  server:
    build: .
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SERVER_PORT: 8080
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

